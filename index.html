--------------------------------------------------------- */
function calcAge(dateStr) {
  if (!dateStr) return "-";
  const b = new Date(dateStr);
  if (isNaN(b)) return "-";
  const now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  const m = now.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
  return age;
}

function formatDate(d) {
  try {
    return new Date(d).toLocaleDateString("ar-DZ", { year: "numeric", month: "long", day: "numeric" });
  } catch {
    return d;
  }
}

async function storageGet(key, fallback) {
  try {
    const snap = await db.collection("agc").doc(key).get();
    if (!snap.exists) return fallback;
    const d = snap.data();
    return d && "data" in d ? d.data : fallback;
  } catch (e) {
    console.error("Firestore read error:", e);
    return fallback;
  }
}
async function storageSet(key, value) {
  try {
    await db.collection("agc").doc(key).set({ data: value });
  } catch (e) {
    console.error("Firestore write error:", e);
    /* silent fail, data stays in memory for this session */
  }
}

function Toast({ toast }) {

  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-xl shadow-2xl ring-1 ring-white/10 bg-neutral-900 text-white text-sm font-almarai flex items-center gap-2 animate-toast">
      <CheckCircle2 className="w-4 h-4 text-emerald-400 shrink-0" />
      <span>{toast}</span>
    </div>
  );
}

function Crest({ size = 90, style }) {
  return (
    <img src={LOGO_SRC} alt="شعار نادي أهلي الغروس" width={size} height={size}
      style={{ width: size, height: size, objectFit: "contain", borderRadius: "9999px", ...style }} />
  );
}

function StepBadge({ step, current }) {
  const active = step === current;
  const done = step < current;
  return (
    <div className={`w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold border-2 shrink-0 transition-all
      ${active ? "border-red-600 text-white bg-red-600/20 scale-110" : done ? "border-yellow-500 text-yellow-400" : "border-neutral-700 text-neutral-500"}`}>
      {step}
    </div>
  );
}

        storageGet(STORAGE_KEYS.activityLog, []),
        storageGet(STORAGE_KEYS.counter, 0),
      ]);
      setRequests(r); setPlayers(p); setNews(n); setMessages(m);
      setSettings(s); setAdminUsers(au); setActivityLog(log); setOrderCounter(oc);
      setLoading(false);
    })();
  }, []);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  }

  function logActivity(action) {
    const entry = { id: Date.now(), action, actor: currentAdmin?.username || "زائر", at: new Date().toISOString() };
    const updated = [entry, ...activityLog].slice(0, 200);
    setActivityLog(updated);
    storageSet(STORAGE_KEYS.activityLog, updated);
  }

  function goto(r) {
    setRoute(r);
    setMenuOpen(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  /* ---------- عمليات الطلبات ---------- */
  async function submitRequest(form) {
    const nextCounter = orderCounter + 1;
    const orderNumber = `AGC-2026-${String(nextCounter).padStart(4, "0")}`;
    const req = {
      id: Date.now().toString(),
      orderNumber,
      ...form,
      status: "قيد المراجعة",
      note: "",
      createdAt: new Date().toISOString(),
    };
    const updated = [req, ...requests];
    setRequests(updated); setOrderCounter(nextCounter); setLastOrder(orderNumber);
    await storageSet(STORAGE_KEYS.requests, updated);
    await storageSet(STORAGE_KEYS.counter, nextCounter);
    logActivity(`طلب انضمام جديد (${orderNumber})`);
    goto("success");
  }

  async function updateRequestStatus(id, status, note) {
    const target = requests.find((r) => r.id === id);
    const updated = requests.map((r) => (r.id === id ? { ...r, status, note: note ?? r.note } : r));
    setRequests(updated);
    await storageSet(STORAGE_KEYS.requests, updated);
    logActivity(`تغيير حالة الطلب ${target?.orderNumber} إلى "${status}"`);

    if (status === "مقبول" && target && !players.some((p) => p.requestId === id)) {
      const player = {
        id: "p" + Date.now(),
        requestId: id,
        firstName: target.firstName, lastName: target.lastName,
        birthDate: target.birthDate, wilaya: target.wilaya,
        position: target.position, subPosition: target.subPosition,
        level: target.level, phone: target.phone,
      };
      const updatedPlayers = [player, ...players];
      setPlayers(updatedPlayers);
      await storageSet(STORAGE_KEYS.players, updatedPlayers);
      logActivity(`إضافة اللاعب ${player.firstName} ${player.lastName} تلقائياً`);
    }
  }

  async function deletePlayer(id) {
    const target = players.find((p) => p.id === id);
    const updated = players.filter((p) => p.id !== id);
    setPlayers(updated);
    await storageSet(STORAGE_KEYS.players, updated);
    logActivity(`حذف اللاعب ${target?.firstName || ""} ${target?.lastName || ""}`);
  }
  async function updatePlayer(id, patch) {
    const updated = players.map((p) => (p.id === id ? { ...p, ...patch } : p));
    setPlayers(updated);
    await storageSet(STORAGE_KEYS.players, updated);
    logActivity(`تعديل بيانات لاعب`);
  }

  /* ---------- عمليات الأخبار ---------- */
  async function saveNewsItem(item) {
    let updated;
    if (item.id) {
      updated = news.map((n) => (n.id === item.id ? item : n));
      logActivity(`تعديل خبر: ${item.title}`);
    } else {
      updated = [{ ...item, id: "n" + Date.now() }, ...news];
      logActivity(`إضافة خبر جديد: ${item.title}`);
    }
    setNews(updated);
    await storageSet(STORAGE_KEYS.news, updated);
  }
  async function deleteNewsItem(id) {
    const target = news.find((n) => n.id === id);
    const updated = news.filter((n) => n.id !== id);
    setNews(updated);
    await storageSet(STORAGE_KEYS.news, updated);
    logActivity(`حذف خبر: ${target?.title || ""}`);
  }

  /* ---------- الرسائل ---------- */
  async function submitMessage(msg) {
    const entry = { id: Date.now().toString(), ...msg, date: new Date().toISOString() };
    const updated = [entry, ...messages];
    setMessages(updated);
    await storageSet(STORAGE_KEYS.messages, updated);
    showToast("تم إرسال رسالتك بنجاح، سنتواصل معك قريباً.");
  }

  /* ---------- الإعدادات ---------- */
  async function saveSettings(s) {
    setSettings(s);
    await storageSet(STORAGE_KEYS.settings, s);
    logActivity("تحديث إعدادات الموقع");
    showToast("تم حفظ الإعدادات");
  }

  /* ---------- المستخدمون ---------- */
  async function addAdminUser(u) {
    const updated = [...adminUsers, u];
    setAdminUsers(updated);
    await storageSet(STORAGE_KEYS.adminUsers, updated);
    logActivity(`إنشاء مستخدم إداري جديد: ${u.username}`);
  }
  async function deleteAdminUser(username) {
    if (adminUsers.length <= 1) return;
    const updated = adminUsers.filter((u) => u.username !== username);
    setAdminUsers(updated);
    await storageSet(STORAGE_KEYS.adminUsers, updated);
    logActivity(`حذف مستخدم إداري: ${username}`);
  }

  function adminLogin(username, password) {
    const found = adminUsers.find((u) => u.username === username && u.password === password);
    if (found) {
      setAdminAuthed(true);
      setCurrentAdmin(found);
      setAdminTab("dashboard");
      goto("admin");
      return true;
    }
    return false;
  }
  function adminLogout() {
    setAdminAuthed(false);
    setCurrentAdmin(null);
    goto("home");
  }

  const brandStyle = { "--brand": settings.primaryColor, "--gold": settings.goldColor };

  if (loading) {
    return (
      <div className="min-h-screen bg-black flex items-center justify-center">
        <div className="w-10 h-10 border-2 border-red-600 border-t-transparent rounded-full animate-spin" />
      </div>
    );
  }

  return (
    <div dir="rtl" style={brandStyle} className="min-h-screen bg-black text-white font-almarai">
      <GlobalStyle />
      <Toast toast={toast} />

      {route === "admin-login" && (
        <AdminLogin onBack={() => goto("home")} onLogin={adminLogin} settings={settings} />
      )}

      {route === "admin" && adminAuthed && (
        <AdminApp
          settings={settings} currentAdmin={currentAdmin} adminTab={adminTab} setAdminTab={setAdminTab}
          requests={requests} players={players} news={news} messages={messages}
          adminUsers={adminUsers} activityLog={activityLog}
          updateRequestStatus={updateRequestStatus} deletePlayer={deletePlayer} updatePlayer={updatePlayer}
          saveNewsItem={saveNewsItem} deleteNewsItem={deleteNewsItem} saveSettings={saveSettings}
          addAdminUser={addAdminUser} deleteAdminUser={deleteAdminUser}
          onLogout={adminLogout} onExit={() => goto("home")}
        />
      )}

      {route !== "admin" && route !== "admin-login" && (
        <PublicSite
          route={route} goto={goto} menuOpen={menuOpen} setMenuOpen={setMenuOpen}
          settings={settings} news={news} requests={requests}
          submitRequest={submitRequest} submitMessage={submitMessage} lastOrder={lastOrder}
        />
      )}
    </div>
  );
}

--------------------------------------------------------- */
function JoinForm({ onSubmit, goto }) {
  const [step, setStep] = useState(1);
  const [errors, setErrors] = useState({});
  const [form, setForm] = useState({
    firstName: "", lastName: "", birthDate: "", phone: "", wilaya: "", baladiya: "", hay: "",
    position: "", subPosition: "", level: "", previousClub: "",
  });

  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }

  function validateStep() {
    const e = {};
    if (step === 1) {
      ["firstName", "lastName", "birthDate", "phone", "wilaya", "baladiya", "hay"].forEach((k) => {
        if (!form[k]) e[k] = "هذا الحقل مطلوب";
      });
    }
    if (step === 2) {
      if (!form.position) e.position = "اختر المركز";
      else if (POSITIONS[form.position].length > 0 && !form.subPosition) e.subPosition = "اختر المركز التفصيلي";
    }
    if (step === 3 && !form.level) e.level = "اختر المستوى";
    if (step === 4 && !form.previousClub) e.previousClub = "اختر إجابة";
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  function next() { if (validateStep()) setStep((s) => Math.min(5, s + 1)); }
  function prev() { setStep((s) => Math.max(1, s - 1)); }

  return (
    <section className="max-w-2xl mx-auto px-4 py-14">
      <div className="text-center mb-8">
        <h1 className="font-changa font-bold text-3xl mb-2">التسجيل في النادي</h1>
        <p className="text-neutral-500 text-sm">أكمل الخطوات التالية لتقديم طلبك</p>
      </div>

      <div className="flex items-center justify-center gap-3 mb-10">
        {[5, 4, 3, 2, 1].map((n, i) => (
          <React.Fragment key={n}>
            <StepBadge step={n} current={step} />
            {i < 4 && <div className="w-8 h-px bg-neutral-800" />}
          </React.Fragment>
        ))}
      </div>

      <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-6 sm:p-8">
        {step === 1 && (
          <div className="space-y-5">
            <h2 className="font-changa font-bold text-xl mb-1">المعلومات الشخصية</h2>
            <Field label="الاسم" value={form.firstName} onChange={(v) => set("firstName", v)} error={errors.firstName} />
            <Field label="اللقب" value={form.lastName} onChange={(v) => set("lastName", v)} error={errors.lastName} />
            <Field type="date" label="تاريخ الميلاد" value={form.birthDate} onChange={(v) => set("birthDate", v)} error={errors.birthDate} />
            <Field type="tel" label="رقم الهاتف" value={form.phone} onChange={(v) => set("phone", v)} error={errors.phone} />
            <SelectField label="الولاية" value={form.wilaya} onChange={(v) => set("wilaya", v)} options={WILAYAS} error={errors.wilaya} />
            <Field label="البلدية" value={form.baladiya} onChange={(v) => set("baladiya", v)} error={errors.baladiya} />
            <Field label="الحي" value={form.hay} onChange={(v) => set("hay", v)} error={errors.hay} />
          </div>
        )}

        {step === 2 && (
          <div className="space-y-6">
            <h2 className="font-changa font-bold text-xl mb-1">المعلومات الرياضية</h2>
            <div>
              <div className="text-sm text-neutral-400 mb-3">المركز</div>
              <div className="grid grid-cols-2 gap-3">
                {Object.keys(POSITIONS).map((p) => (
                  <ChoiceCard key={p} label={p} active={form.position === p}
                    onClick={() => { set("position", p); set("subPosition", ""); }} />
                ))}
              </div>
              {errors.position && <ErrorText text={errors.position} />}
            </div>

            {form.position && POSITIONS[form.position].length > 0 && (
              <div>
                <div className="text-sm text-neutral-400 mb-3">المركز التفصيلي</div>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                  {POSITIONS[form.position].map((sp) => (
                    <ChoiceCard key={sp} label={sp} active={form.subPosition === sp} onClick={() => set("subPosition", sp)} small />
                  ))}
                </div>
                {errors.subPosition && <ErrorText text={errors.subPosition} />}
              </div>
            )}
          </div>
        )}

        {step === 3 && (
          <div>
            <h2 className="font-changa font-bold text-xl mb-4">المستوى</h2>
            <div className="grid grid-cols-3 gap-3">
              {LEVELS.map((l) => (
                <ChoiceCard key={l} label={l} active={form.level === l} onClick={() => set("level", l)} />
              ))}
            </div>
            {errors.level && <ErrorText text={errors.level} />}
          </div>
        )}

        {step === 4 && (
          <div>
            <h2 className="font-changa font-bold text-xl mb-4">هل سبق أن لعبت في نادٍ؟</h2>
            <div className="grid grid-cols-2 gap-3">
              <ChoiceCard label="نعم" active={form.previousClub === "نعم"} onClick={() => set("previousClub", "نعم")} />
              <ChoiceCard label="لا" active={form.previousClub === "لا"} onClick={() => set("previousClub", "لا")} />
            </div>
            {errors.previousClub && <ErrorText text={errors.previousClub} />}
          </div>
        )}

        {step === 5 && (
          <div>
            <h2 className="font-changa font-bold text-xl mb-5">مراجعة البيانات</h2>
            <div className="grid sm:grid-cols-2 gap-x-6 gap-y-3 text-sm">
              <Review label="الاسم" value={form.firstName} />
              <Review label="اللقب" value={form.lastName} />
              <Review label="تاريخ الميلاد" value={form.birthDate} />
              <Review label="رقم الهاتف" value={form.phone} />
              <Review label="الولاية" value={form.wilaya} />
              <Review label="البلدية" value={form.baladiya} />
              <Review label="الحي" value={form.hay} />
              <Review label="المركز" value={form.subPosition ? `${form.position} - ${form.subPosition}` : form.position} />
              <Review label="المستوى" value={form.level} />
              <Review label="لعب سابق في نادٍ" value={form.previousClub} />
            </div>
          </div>
        )}

        <div className="flex items-center justify-between mt-8 pt-6 border-t border-neutral-900">
          {step > 1 ? (
            <button onClick={prev} className="flex items-center gap-1 text-sm text-neutral-400 hover:text-white font-bold">
              <ChevronRight className="w-4 h-4" /> السابق
            </button>
          ) : <button onClick={() => goto("home")} className="text-sm text-neutral-500 hover:text-white">إلغاء</button>}

          {step < 5 ? (
            <button onClick={next} className="flex items-center gap-1 bg-red-600 hover:bg-red-500 px-5 py-2.5 rounded-lg text-sm font-bold">
              التالي <ChevronLeft className="w-4 h-4" />
            </button>
          ) : (
            <button onClick={() => onSubmit(form)} className="flex items-center gap-2 bg-red-600 hover:bg-red-500 px-6 py-2.5 rounded-lg text-sm font-bold">
              <Check className="w-4 h-4" /> تأكيد وإرسال الطلب
            </button>
          )}
        </div>
      </div>
    </section>
  );
}

function Field({ label, value, onChange, type = "text", error }) {
  return (
    <label className="block">
      <span className="block text-sm text-neutral-400 mb-1.5 text-right">{label}</span>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
        className={`w-full bg-neutral-900 border rounded-lg px-4 py-2.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-red-600/50 ${error ? "border-red-600" : "border-neutral-800"}`} />
      {error && <ErrorText text={error} />}
    </label>
  );
}
function SelectField({ label, value, onChange, options, error }) {
  return (
    <label className="block">
      <span className="block text-sm text-neutral-400 mb-1.5 text-right">{label}</span>
      <select value={value} onChange={(e) => onChange(e.target.value)}
        className={`w-full bg-neutral-900 border rounded-lg px-4 py-2.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-red-600/50 ${error ? "border-red-600" : "border-neutral-800"}`}>
        <option value="">اختر...</option>
        {options.map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
      {error && <ErrorText text={error} />}

}
function ErrorText({ text }) {
  return <div className="text-xs text-red-500 mt-1 text-right">{text}</div>;
}
function ChoiceCard({ label, active, onClick, small }) {
  return (
    <button onClick={onClick}
      className={`${small ? "py-2.5" : "py-4"} px-3 rounded-xl border text-sm font-bold transition-all
      ${active ? "border-red-600 bg-red-600/15 text-white" : "border-neutral-800 bg-neutral-900 text-neutral-400 hover:border-neutral-600"}`}>
      {label}
    </button>
  );
}
function Review({ label, value }) {
  return (
    <div className="flex items-center justify-between bg-neutral-900/60 rounded-lg px-3 py-2">
      <span className="text-neutral-500">{label}</span>
      <span className="font-bold">{value || "-"}</span>
    </div>
  );
}

/* ---------------------------------------------------------
   متابعة حالة الطلب
--------------------------------------------------------- */
function TrackStatus({ requests }) {
  const [q, setQ] = useState("");
  const [result, setResult] = useState(undefined);

  function search() {
    const found = requests.find((r) => r.orderNumber.trim() === q.trim());
    setResult(found || null);
  }

  return (
    <section className="max-w-lg mx-auto px-4 py-16">
      <h1 className="font-changa font-bold text-2xl mb-2 text-center">متابعة حالة الطلب</h1>
      <p className="text-neutral-500 text-sm text-center mb-8">أدخل رقم الطلب الذي حصلت عليه بعد التسجيل</p>
      <div className="flex gap-2 mb-8">
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="AGC-2026-0001"
          className="flex-1 bg-neutral-900 border border-neutral-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-600/50 text-center tracking-widest" />
        <button onClick={search} className="bg-red-600 hover:bg-red-500 px-5 rounded-lg"><Search className="w-4 h-4" /></button>
      </div>

      {result === null && (
        <div className="text-center text-neutral-500 text-sm">لم يتم العثور على طلب بهذا الرقم.</div>
      )}
      {result && (
        <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-6 text-center">
          <div className="text-xs text-neutral-500 mb-1">{result.orderNumber}</div>
          <div className="font-bold text-lg mb-4">{result.firstName} {result.lastName}</div>
          <StatusBadge status={result.status} large />
          {result.note && <div className="mt-4 text-sm text-neutral-400 bg-neutral-900 rounded-lg p-3">{result.note}</div>}
        </div>
      )}
    </section>
  );
}

function StatusBadge({ status, large }) {
  const s = STATUS_STYLES[status] || STATUS_STYLES["قيد المراجعة"];
  const Icon = s.icon;
  return (
    <span className={`inline-flex items-center gap-1.5 ${s.bg} ${s.text} ring-1 ${s.ring} rounded-full ${large ? "px-4 py-2 text-sm" : "px-2.5 py-1 text-xs"} font-bold`}>
      <Icon className={large ? "w-4 h-4" : "w-3 h-3"} /> {status}
    </span>
  );
}

/* ---------------------------------------------------------

--------------------------------------------------------- */
function ContactPage({ settings, onSubmit }) {
  const [form, setForm] = useState({ name: "", contact: "", message: "" });
  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }
  function submit() {
    if (!form.name || !form.contact || !form.message) return;
    onSubmit(form);
    setForm({ name: "", contact: "", message: "" });
  }
  return (
    <section className="max-w-lg mx-auto px-4 py-16">
      <h1 className="font-changa font-bold text-2xl mb-2 text-center">تواصل معنا</h1>
      <p className="text-neutral-500 text-sm text-center mb-8">لأي استفسار، راسلنا وسنرد عليك في أقرب وقت</p>
      <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-6 space-y-4">
        <Field label="الاسم" value={form.name} onChange={(v) => set("name", v)} />
        <Field label="البريد الإلكتروني أو رقم الهاتف" value={form.contact} onChange={(v) => set("contact", v)} />
        <label className="block">
          <span className="block text-sm text-neutral-400 mb-1.5 text-right">الرسالة</span>
          <textarea value={form.message} onChange={(e) => set("message", e.target.value)} rows={4}
            className="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-4 py-2.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-red-600/50" />
        </label>
        <button onClick={submit} className="w-full bg-red-600 hover:bg-red-500 py-3 rounded-lg text-sm font-bold">إرسال الرسالة</button>
        <div className="text-xs text-neutral-600 text-center pt-2">{settings.phone} · {settings.email}</div>
      </div>
    </section>
  );
}

  return (
    <div className="min-h-screen flex items-center justify-center px-4 bg-black relative overflow-hidden">

        <h1 className="font-changa font-bold text-xl mb-1 flex items-center justify-center gap-2">
          لوحة تحكم الإدارة <ShieldCheck className="w-5 h-5 text-red-500" />
        </h1>
        <p className="text-neutral-500 text-sm mb-6">سجّل الدخول للمتابعة</p>

function AdminApp({

  deleteNewsItem, saveSettings, addAdminUser, deleteAdminUser, onLogout, onExit,
}) {

    { key: "dashboard", label: "لوحة القيادة", icon: LayoutDashboard },

    { key: "news", label: "الأخبار", icon: Newspaper },
    { key: "messages", label: "الرسائل", icon: MessageSquare },
    { key: "settings", label: "الإعدادات", icon: SettingsIcon },
    { key: "users", label: "المستخدمون", icon: KeyRound },
    { key: "log", label: "سجل النشاط", icon: Activity },
  ];

  return (
    <div className="min-h-screen flex">
      <aside className="hidden md:flex w-64 shrink-0 bg-neutral-950 border-l border-neutral-800 flex-col p-4">
        <div className="flex items-center gap-2 px-2 py-3 mb-4">
          <Crest size={34} />
          <div>
            <div className="font-changa font-bold text-sm">{settings.clubNameAr}</div>
            <div className="text-[10px] text-neutral-500">الإدارة</div>
          </div>
        </div>
        <nav className="flex-1 space-y-1">
          {tabs.map((t) => (
            <button key={t.key} onClick={() => setAdminTab(t.key)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold transition ${adminTab === t.key ? "bg-red-600/15 text-red-400 ring-1 ring-red-600/30" : "text-neutral-400 hover:bg-neutral-900"}`}>
              <t.icon className="w-4 h-4" /> {t.label}

          ))}
        </nav>
        <div className="border-t border-neutral-900 pt-3 mt-3 space-y-1">
          <button onClick={onExit} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-neutral-400 hover:bg-neutral-900">
            <ArrowRight className="w-4 h-4" /> عرض الموقع
          </button>
          <button onClick={onLogout} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-red-400 hover:bg-red-600/10">
            <LogOut className="w-4 h-4" /> تسجيل الخروج
          </button>
        </div>
      </aside>

      <div className="flex-1 min-w-0">
        <div className="md:hidden sticky top-0 z-30 bg-neutral-950 border-b border-neutral-800 px-4 py-3 flex items-center justify-between">
          <select value={adminTab} onChange={(e) => setAdminTab(e.target.value)}
            className="bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-sm">
            {tabs.map((t) => <option key={t.key} value={t.key}>{t.label}</option>)}
          </select>
          <button onClick={onLogout} className="text-red-400 text-sm flex items-center gap-1"><LogOut className="w-4 h-4" /> خروج</button>
        </div>

        <div className="p-5 sm:p-8 max-w-6xl mx-auto">
          <div className="flex items-center justify-between mb-6">
            <h1 className="font-changa font-bold text-2xl">{tabs.find((t) => t.key === adminTab)?.label}</h1>
            <div className="text-xs text-neutral-500 hidden sm:block">مرحباً، {currentAdmin?.username} · {currentAdmin?.role}</div>

          {adminTab === "dashboard" && <DashboardTab requests={requests} players={players} news={news} />}
          {adminTab === "requests" && <RequestsTab requests={requests} updateRequestStatus={updateRequestStatus} />}
          {adminTab === "players" && <PlayersTab players={players} deletePlayer={deletePlayer} updatePlayer={updatePlayer} />}
          {adminTab === "news" && <NewsTab news={news} saveNewsItem={saveNewsItem} deleteNewsItem={deleteNewsItem} />}
          {adminTab === "messages" && <MessagesTab messages={messages} />}
          {adminTab === "settings" && <SettingsTab settings={settings} saveSettings={saveSettings} />}
          {adminTab === "users" && <UsersTab adminUsers={adminUsers} addAdminUser={addAdminUser} deleteAdminUser={deleteAdminUser} currentAdmin={currentAdmin} />}
          {adminTab === "log" && <LogTab activityLog={activityLog} />}

}

function StatCard({ label, value, color = "text-white" }) {
  return (
    <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5">
      <div className="text-xs text-neutral-500 mb-2">{label}</div>
      <div className={`font-changa font-bold text-3xl ${color}`}>{value}</div>
    </div>
  );
}

function DashboardTab({ requests, players, news }) {
  const total = requests.length;
  const accepted = requests.filter((r) => r.status === "مقبول").length;
  const rejected = requests.filter((r) => r.status === "مرفوض").length;
  const pending = requests.filter((r) => r.status === "قيد المراجعة").length;
  return (
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <StatCard label="إجمالي الطلبات" value={total} />
      <StatCard label="الطلبات المقبولة" value={accepted} color="text-emerald-400" />
      <StatCard label="الطلبات المرفوضة" value={rejected} color="text-red-400" />
      <StatCard label="الطلبات قيد المراجعة" value={pending} color="text-yellow-400" />
      <StatCard label="عدد اللاعبين" value={players.length} />
      <StatCard label="عدد الأخبار" value={news.length} />
    </div>
  );
}

function RequestsTab({ requests, updateRequestStatus }) {
  const [active, setActive] = useState(null);
  const [note, setNote] = useState("");

  function openDetail(r) { setActive(r); setNote(r.note || ""); }

  return (
    <div className="bg-neutral-950 border border-neutral-800 rounded-2xl overflow-hidden">
      <div className="overflow-x-auto">
        <table className="w-full text-sm min-w-[900px]">
          <thead className="bg-neutral-900 text-neutral-400 text-xs">
            <tr>
              {["رقم الطلب", "الاسم", "اللقب", "العمر", "الولاية", "البلدية", "المركز", "المستوى", "الحالة", "إجراءات"].map((h) => (
                <th key={h} className="px-4 py-3 text-right font-bold whitespace-nowrap">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {requests.map((r) => (
              <tr key={r.id} className="border-t border-neutral-900 hover:bg-neutral-900/40">
                <td className="px-4 py-3 whitespace-nowrap font-bold text-red-400">{r.orderNumber}</td>
                <td className="px-4 py-3 whitespace-nowrap">{r.firstName}</td>
                <td className="px-4 py-3 whitespace-nowrap">{r.lastName}</td>
                <td className="px-4 py-3 whitespace-nowrap">{calcAge(r.birthDate)}</td>
                <td className="px-4 py-3 whitespace-nowrap">{r.wilaya}</td>
                <td className="px-4 py-3 whitespace-nowrap">{r.baladiya}</td>
                <td className="px-4 py-3 whitespace-nowrap">{r.position}</td>
                <td className="px-4 py-3 whitespace-nowrap">{r.level}</td>
                <td className="px-4 py-3 whitespace-nowrap"><StatusBadge status={r.status} /></td>
                <td className="px-4 py-3 whitespace-nowrap">
                  <div className="flex items-center gap-1.5">
                    <IconBtn title="عرض التفاصيل" onClick={() => openDetail(r)}><Eye className="w-3.5 h-3.5" /></IconBtn>
                    <IconBtn title="قبول" tone="emerald" onClick={() => updateRequestStatus(r.id, "مقبول")}><Check className="w-3.5 h-3.5" /></IconBtn>
                    <IconBtn title="رفض" tone="red" onClick={() => updateRequestStatus(r.id, "مرفوض")}><XCircle className="w-3.5 h-3.5" /></IconBtn>
                    <IconBtn title="قيد المراجعة" tone="yellow" onClick={() => updateRequestStatus(r.id, "قيد المراجعة")}><Clock3 className="w-3.5 h-3.5" /></IconBtn>
                  </div>
                </td>
              </tr>
            ))}
            {requests.length === 0 && (
              <tr><td colSpan={10} className="text-center py-10 text-neutral-500">لا توجد طلبات حتى الآن.</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {active && (
        <Modal onClose={() => setActive(null)} title={`تفاصيل الطلب ${active.orderNumber}`}>
          <div className="grid sm:grid-cols-2 gap-3 text-sm mb-4">
            <Review label="الاسم" value={active.firstName} />
            <Review label="اللقب" value={active.lastName} />
            <Review label="العمر" value={calcAge(active.birthDate)} />
            <Review label="الهاتف" value={active.phone} />
            <Review label="الولاية" value={active.wilaya} />
            <Review label="البلدية" value={active.baladiya} />
            <Review label="الحي" value={active.hay} />
            <Review label="المركز" value={active.subPosition ? `${active.position} - ${active.subPosition}` : active.position} />
            <Review label="المستوى" value={active.level} />
            <Review label="لعب سابق" value={active.previousClub} />
          </div>
          <label className="block mb-4">
            <span className="block text-sm text-neutral-400 mb-1.5 text-right">إضافة ملاحظة</span>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} rows={3}
              className="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-4 py-2.5 text-sm text-right" />
          </label>
          <div className="flex gap-2 flex-wrap">
            <button onClick={() => { updateRequestStatus(active.id, "مقبول", note); setActive(null); }}
              className="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-lg text-sm font-bold">قبول</button>
            <button onClick={() => { updateRequestStatus(active.id, "مرفوض", note); setActive(null); }}
              className="flex-1 bg-red-600 hover:bg-red-500 py-2.5 rounded-lg text-sm font-bold">رفض</button>
            <button onClick={() => { updateRequestStatus(active.id, active.status, note); setActive(null); }}
              className="flex-1 bg-neutral-800 hover:bg-neutral-700 py-2.5 rounded-lg text-sm font-bold">حفظ الملاحظة</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function IconBtn({ children, onClick, title, tone }) {
  const toneClass = tone === "emerald" ? "hover:bg-emerald-600/20 hover:text-emerald-400"
    : tone === "red" ? "hover:bg-red-600/20 hover:text-red-400"
    : tone === "yellow" ? "hover:bg-yellow-600/20 hover:text-yellow-400"
    : "hover:bg-neutral-700";
  return (
    <button title={title} onClick={onClick} className={`w-7 h-7 rounded-md bg-neutral-900 flex items-center justify-center text-neutral-400 transition ${toneClass}`}>
      {children}
    </button>
  );
}

function Modal({ title, children, onClose }) {
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center px-4" onClick={onClose}>
      <div dir="rtl" onClick={(e) => e.stopPropagation()} className="bg-neutral-950 border border-neutral-800 rounded-2xl p-6 w-full max-w-lg max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-5">
          <h3 className="font-changa font-bold text-lg">{title}</h3>
          <button onClick={onClose} className="text-neutral-500 hover:text-white"><X className="w-5 h-5" /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function PlayersTab({ players, deletePlayer, updatePlayer }) {
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);

  return (
    <div className="bg-neutral-950 border border-neutral-800 rounded-2xl overflow-hidden">
      <div className="overflow-x-auto">
        <table className="w-full text-sm min-w-[800px]">
          <thead className="bg-neutral-900 text-neutral-400 text-xs">
            <tr>
              {["الاسم", "اللقب", "العمر", "المركز", "المستوى", "الولاية", "إجراءات"].map((h) => (
                <th key={h} className="px-4 py-3 text-right font-bold whitespace-nowrap">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {players.map((p) => (
              <tr key={p.id} className="border-t border-neutral-900 hover:bg-neutral-900/40">
                <td className="px-4 py-3 whitespace-nowrap">{p.firstName}</td>
                <td className="px-4 py-3 whitespace-nowrap">{p.lastName}</td>
                <td className="px-4 py-3 whitespace-nowrap">{calcAge(p.birthDate)}</td>
                <td className="px-4 py-3 whitespace-nowrap">{p.position}</td>
                <td className="px-4 py-3 whitespace-nowrap">{p.level}</td>
                <td className="px-4 py-3 whitespace-nowrap">{p.wilaya}</td>
                <td className="px-4 py-3 whitespace-nowrap">
                  <div className="flex items-center gap-1.5">
                    <IconBtn title="عرض" onClick={() => setViewing(p)}><Eye className="w-3.5 h-3.5" /></IconBtn>
                    <IconBtn title="تعديل" onClick={() => setEditing({ ...p })}><Pencil className="w-3.5 h-3.5" /></IconBtn>
                    <IconBtn title="حذف" tone="red" onClick={() => { if (confirm("تأكيد حذف اللاعب؟")) deletePlayer(p.id); }}><Trash2 className="w-3.5 h-3.5" /></IconBtn>
                  </div>
                </td>
              </tr>
            ))}
            {players.length === 0 && <tr><td colSpan={7} className="text-center py-10 text-neutral-500">لا يوجد لاعبون بعد. يتم إضافتهم تلقائياً عند قبول الطلب.</td></tr>}
          </tbody>
        </table>
      </div>

      {viewing && (
        <Modal title={`${viewing.firstName} ${viewing.lastName}`} onClose={() => setViewing(null)}>
          <div className="grid sm:grid-cols-2 gap-3 text-sm">
            <Review label="العمر" value={calcAge(viewing.birthDate)} />
            <Review label="الهاتف" value={viewing.phone} />
            <Review label="المركز" value={viewing.subPosition ? `${viewing.position} - ${viewing.subPosition}` : viewing.position} />
            <Review label="المستوى" value={viewing.level} />
            <Review label="الولاية" value={viewing.wilaya} />
          </div>
        </Modal>
      )}

      {editing && (
        <Modal title="تعديل بيانات اللاعب" onClose={() => setEditing(null)}>
          <div className="space-y-4">
            <Field label="الاسم" value={editing.firstName} onChange={(v) => setEditing({ ...editing, firstName: v })} />
            <Field label="اللقب" value={editing.lastName} onChange={(v) => setEditing({ ...editing, lastName: v })} />
            <SelectField label="المستوى" value={editing.level} onChange={(v) => setEditing({ ...editing, level: v })} options={LEVELS} />
            <button onClick={() => { updatePlayer(editing.id, editing); setEditing(null); }}
              className="w-full bg-red-600 hover:bg-red-500 py-2.5 rounded-lg text-sm font-bold">حفظ التعديلات</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function NewsTab({ news, saveNewsItem, deleteNewsItem }) {
  const [editing, setEditing] = useState(null);

  return (
    <div>
      <div className="flex justify-end mb-4">
        <button onClick={() => setEditing({ title: "", description: "", image: "", date: new Date().toISOString().slice(0, 10) })}
          className="flex items-center gap-2 bg-red-600 hover:bg-red-500 px-4 py-2.5 rounded-lg text-sm font-bold">
          <Plus className="w-4 h-4" /> إضافة خبر جديد
        </button>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {news.map((n) => (
          <div key={n.id} className="bg-neutral-950 border border-neutral-800 rounded-2xl overflow-hidden">
            <div className="aspect-[3/2] bg-neutral-900"><img src={n.image} alt="" className="w-full h-full object-cover" /></div>
            <div className="p-4">
              <div className="text-xs text-neutral-500 mb-1">{formatDate(n.date)}</div>
              <div className="font-bold mb-2 line-clamp-1">{n.title}</div>
              <div className="flex gap-2">
                <button onClick={() => setEditing({ ...n })} className="flex-1 bg-neutral-800 hover:bg-neutral-700 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-1"><Pencil className="w-3 h-3" /> تعديل</button>
                <button onClick={() => { if (confirm("تأكيد حذف الخبر؟")) deleteNewsItem(n.id); }} className="flex-1 bg-red-600/20 text-red-400 hover:bg-red-600/30 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-1"><Trash2 className="w-3 h-3" /> حذف</button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {editing && (
        <Modal title={editing.id ? "تعديل الخبر" : "إضافة خبر جديد"} onClose={() => setEditing(null)}>
          <div className="space-y-4">
            <Field label="العنوان" value={editing.title} onChange={(v) => setEditing({ ...editing, title: v })} />
            <label className="block">
              <span className="block text-sm text-neutral-400 mb-1.5 text-right">الوصف</span>
              <textarea value={editing.description} onChange={(e) => setEditing({ ...editing, description: e.target.value })} rows={4}
                className="w-full bg-neutral-900 border border-neutral-800 rounded-lg px-4 py-2.5 text-sm text-right" />
            </label>
            <Field label="رابط الصورة" value={editing.image} onChange={(v) => setEditing({ ...editing, image: v })} />
            <Field type="date" label="التاريخ" value={editing.date} onChange={(v) => setEditing({ ...editing, date: v })} />
            <button onClick={() => { saveNewsItem(editing); setEditing(null); }}
              className="w-full bg-red-600 hover:bg-red-500 py-2.5 rounded-lg text-sm font-bold">حفظ الخبر</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function MessagesTab({ messages }) {
  return (
    <div className="space-y-3">
      {messages.map((m) => (
        <div key={m.id} className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5">
          <div className="flex items-center justify-between mb-2">
            <span className="font-bold">{m.name}</span>
            <span className="text-xs text-neutral-500">{formatDate(m.date)}</span>
          </div>
          <div className="text-xs text-neutral-500 mb-2">{m.contact}</div>
          <p className="text-sm text-neutral-300">{m.message}</p>
        </div>
      ))}
      {messages.length === 0 && <div className="text-center text-neutral-500 py-16">لا توجد رسائل حالياً.</div>}
    </div>
  );
}

function SettingsTab({ settings, saveSettings }) {
  const [s, setS] = useState(settings);
  function set(k, v) { setS((f) => ({ ...f, [k]: v })); }
  return (
    <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-6 max-w-2xl space-y-5">
      <Field label="اسم النادي (عربي)" value={s.clubNameAr} onChange={(v) => set("clubNameAr", v)} />
      <Field label="اسم النادي (إنجليزي)" value={s.clubNameEn} onChange={(v) => set("clubNameEn", v)} />
      <Field label="الشعار النصي (Motto)" value={s.motto} onChange={(v) => set("motto", v)} />
      <Field label="رابط شعار النادي (Logo URL)" value={s.logo} onChange={(v) => set("logo", v)} />
      <Field label="رابط صورة الغلاف (Cover URL)" value={s.cover} onChange={(v) => set("cover", v)} />
      <div className="grid grid-cols-2 gap-4">
        <label className="block">
          <span className="block text-sm text-neutral-400 mb-1.5">اللون الأساسي</span>
          <input type="color" value={s.primaryColor} onChange={(e) => set("primaryColor", e.target.value)} className="w-full h-10 bg-neutral-900 border border-neutral-800 rounded-lg" />
        </label>
        <label className="block">
          <span className="block text-sm text-neutral-400 mb-1.5">لون الذهبي</span>
          <input type="color" value={s.goldColor} onChange={(e) => set("goldColor", e.target.value)} className="w-full h-10 bg-neutral-900 border border-neutral-800 rounded-lg" />
        </label>
      </div>
      <Field label="رقم الهاتف" value={s.phone} onChange={(v) => set("phone", v)} />
      <Field label="البريد الإلكتروني" value={s.email} onChange={(v) => set("email", v)} />
      <Field label="فيسبوك" value={s.facebook} onChange={(v) => set("facebook", v)} />
      <Field label="إنستغرام" value={s.instagram} onChange={(v) => set("instagram", v)} />
      <Field label="تويتر" value={s.twitter} onChange={(v) => set("twitter", v)} />
      <div>
        <span className="block text-sm text-neutral-400 mb-2">اللغات المفعّلة</span>
        <div className="flex gap-4">
          {["العربية", "الإنجليزية", "الفرنسية"].map((lang) => (
            <label key={lang} className="flex items-center gap-2 text-sm">
              <input type="checkbox" checked={s.languages.includes(lang)}
                onChange={(e) => {
                  const langs = e.target.checked ? [...s.languages, lang] : s.languages.filter((l) => l !== lang);
                  set("languages", langs);
                }} />
              {lang}
            </label>
          ))}
        </div>
      </div>
      <button onClick={() => saveSettings(s)} className="w-full bg-red-600 hover:bg-red-500 py-3 rounded-lg text-sm font-bold">حفظ الإعدادات</button>
    </div>
  );
}

function UsersTab({ adminUsers, addAdminUser, deleteAdminUser, currentAdmin }) {
  const [form, setForm] = useState({ username: "", password: "", role: "مشرف" });
  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }
  function submit() {
    if (!form.username || !form.password) return;
    if (adminUsers.some((u) => u.username === form.username)) return alert("اسم المستخدم موجود مسبقاً");
    addAdminUser(form);
    setForm({ username: "", password: "", role: "مشرف" });
  }
  return (
    <div className="grid lg:grid-cols-3 gap-6">
      <div className="lg:col-span-2 bg-neutral-950 border border-neutral-800 rounded-2xl overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-neutral-900 text-neutral-400 text-xs">
            <tr>
              <th className="px-4 py-3 text-right">اسم المستخدم</th>
              <th className="px-4 py-3 text-right">الدور</th>
              <th className="px-4 py-3 text-right">إجراءات</th>
            </tr>
          </thead>
          <tbody>
            {adminUsers.map((u) => (
              <tr key={u.username} className="border-t border-neutral-900">
                <td className="px-4 py-3 font-bold">{u.username} {u.username === currentAdmin?.username && <span className="text-xs text-neutral-500">(أنت)</span>}</td>
                <td className="px-4 py-3">{u.role}</td>
                <td className="px-4 py-3">
                  <IconBtn title="حذف" tone="red" onClick={() => deleteAdminUser(u.username)}><Trash2 className="w-3.5 h-3.5" /></IconBtn>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5 space-y-4 h-fit">
        <h3 className="font-changa font-bold">إنشاء مستخدم جديد</h3>
        <Field label="اسم المستخدم" value={form.username} onChange={(v) => set("username", v)} />
        <Field type="password" label="كلمة المرور" value={form.password} onChange={(v) => set("password", v)} />
        <SelectField label="الدور" value={form.role} onChange={(v) => set("role", v)} options={["مدير عام", "مشرف", "محرر أخبار"]} />
        <button onClick={submit} className="w-full bg-red-600 hover:bg-red-500 py-2.5 rounded-lg text-sm font-bold">إنشاء المستخدم</button>
      </div>
    </div>
  );
}

function LogTab({ activityLog }) {
  return (
    <div className="bg-neutral-950 border border-neutral-800 rounded-2xl divide-y divide-neutral-900">
      {activityLog.map((l) => (
        <div key={l.id} className="px-5 py-3 flex items-center justify-between text-sm">
          <div className="flex items-center gap-2">
            <Activity className="w-3.5 h-3.5 text-red-500 shrink-0" />
            <span>{l.action}</span>
          </div>
          <div className="text-xs text-neutral-500 flex items-center gap-2 shrink-0">
            <span>{l.actor}</span>
            <span>{new Date(l.at).toLocaleString("ar-DZ")}</span>
          </div>
        </div>
      ))}
      {activityLog.length === 0 && <div className="text-center text-neutral-500 py-16">لا يوجد نشاط مسجل بعد.</div>}
    </div>
  );
}

/* ---------------------------------------------------------
   أنماط عامة وحركات
--------------------------------------------------------- */
function GlobalStyle() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Changa:wght@500;600;700;800&family=Almarai:wght@400;700;800&display=swap');
      .font-changa { font-family: 'Changa', sans-serif; }
      .font-almarai { font-family: 'Almarai', sans-serif; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(16px);} to { opacity: 1; transform: translateY(0);} }
      .animate-fadeUp { animation: fadeUp .7s ease both; }

      @keyframes glow { 0%,100% { opacity: .45; transform: scale(1);} 50% { opacity: .8; transform: scale(1.12);} }
      .animate-glow { animation: glow 3.2s ease-in-out infinite; }

      @keyframes drift1 { 0% { transform: translate(0,0);} 50% { transform: translate(40px,-30px);} 100% { transform: translate(0,0);} }
      @keyframes drift2 { 0% { transform: translate(0,0);} 50% { transform: translate(-50px,20px);} 100% { transform: translate(0,0);} }
      .animate-drift1 { animation: drift1 14s ease-in-out infinite; }
      .animate-drift2 { animation: drift2 18s ease-in-out infinite; }

      @keyframes toast { from { opacity:0; transform: translate(-50%,10px);} to { opacity:1; transform: translate(-50%,0);} }
      .animate-toast { animation: toast .25s ease both; }

      ::selection { background: #c8102e; color: white; }
      input:focus, select:focus, textarea:focus { outline: none; }
      table { border-collapse: collapse; }
    `}</style>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
